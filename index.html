      <div>
        <h1>登山ログ ― 日記を取り込んで過去の自分と再会する無料ウェブアプリ</h1>
        <p>登山ログは、個人の日記やメモを管理・分析・可視化するためのプライバシーファーストな無料ウェブアプリです。「登山」は自分を高めるという意味の比喩であり、実際の登山記録アプリではありません。すべてのデータはブラウザ内（IndexedDB）に保存され、外部サーバーへの送信はありません。アカウント登録不要で、PWA対応によりオフラインでも利用できます。</p>

        <h2>10の主要機能</h2>
        <ul>
          <li><strong>ランダム再会</strong> ― 過去の日記にランダムで再会。「他人モード」で匿名化して新鮮な目線で読み返し、「未来からの報告」で過去の自分にコメントを残せる。</li>
          <li><strong>この日の記録</strong> ― 1年前、3年前、5年前の同じ日を振り返る。時間を縦に貫いて、自分の変化を感じる。</li>
          <li><strong>日月年の変化</strong> ― 今日を基準に、1日前・1週間前・1ヶ月前・1年前の日記を並べて表示。</li>
          <li><strong>キーワード検索</strong> ― 日記の全文キーワード検索。日付範囲の絞り込みやソート順の切り替えに対応。</li>
          <li><strong>カレンダーヒートマップ</strong> ― 日記の記録密度をカレンダーヒートマップで一望。</li>
          <li><strong>成長タイムライン</strong> ― AIを使わずに端末内で完結する感情分析。ネガティブ比率・安定指数・標高メタファー・トレンド検出をグラフで可視化。</li>
          <li><strong>ワードクラウド</strong> ― よく使う言葉を可視化して語彙の傾向を把握。</li>
          <li><strong>AI分析（7種類）</strong> ― Claude APIで日記を深層分析。今日・今日の景色・急所・外基準の統合・自然の眼・時間の地層・横断読みの7種類。</li>
          <li><strong>観測所</strong> ― やさしい問いかけで日々を記録するジャーナリング。</li>
          <li><strong>宝物庫</strong> ― AIが日記の中から「光っている一文」を自動で見つけて集める。</li>
        </ul>

        <h2>使い方（3ステップ）</h2>
        <ol>
          <li><strong>日記をインポート</strong>: テキストファイル（.txt）、Markdown（.md）、JSON（.json）をドラッグ＆ドロップ。日付を自動認識。</li>
          <li><strong>好きな方法で読み返す</strong>: ランダム再会・この日の記録・キーワード検索・カレンダーで日記を振り返る。</li>
          <li><strong>可視化・分析</strong>: タイムラインで感情の推移、ワードクラウドで語彙傾向、AI分析で新たな気づきを得る。</li>
        </ol>

        <h2>特徴</h2>
        <ul>
          <li>完全無料・アカウント登録不要</li>
          <li>データは端末内のみ保存（IndexedDB）・サーバー送信なし</li>
          <li>Cookie・トラッキング一切不使用</li>
          <li>PWA対応でオフライン動作</li>
          <li>テキスト・Markdown・JSON形式の日記インポート対応</li>
          <li>Claude APIによる7種類のAI深層分析</li>
          <li>ローカル感情分析（AI不要・端末内完結）</li>
          <li>レスポンシブデザイン（PC・スマホ・タブレット対応）</li>
        </ul>

        <h2>よくある質問</h2>
        <dl>
          <dt>登山ログとは何ですか？</dt>
          <dd>個人の日記やメモを管理・分析するための無料ウェブアプリです。「登山」は自分を高めるという意味の比喩で、実際の登山記録アプリではありません。</dd>
          <dt>データはどこに保存されますか？</dt>
          <dd>すべてのデータはお使いの端末のブラウザ内（IndexedDB）に保存されます。外部サーバーへの送信はありません。</dd>
          <dt>無料で使えますか？</dt>
          <dd>はい、完全無料です。アカウント登録も不要です。AI分析機能利用時のみAnthropic APIキーが必要で、API利用料が別途発生します。</dd>
          <dt>オフラインでも使えますか？</dt>
          <dd>はい、PWA対応で一度アクセスすればオフラインでも利用できます。AI分析のみインターネット接続が必要です。</dd>
          <dt>スマートフォンでも使えますか？</dt>
          <dd>はい、レスポンシブデザインで全デバイスに対応。PWAとしてホーム画面に追加も可能です。</dd>
        </dl>
