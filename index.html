        <h1>登山ログ ― 昔の自分の言葉に、もう一度会える日記分析アプリ</h1>
        <p>登山ログは、日記を取り込んでAIで深層分析するための無料ウェブアプリです。「登山」は自分を高めるという意味の比喩であり、実際の登山記録アプリではありません。すべてのデータはブラウザ内（IndexedDB）に保存され、外部サーバーへの送信はありません。アカウント登録不要で、PWA対応によりオフラインでも利用できます。</p>

        <h2>主な機能</h2>
        <ul>
          <li><strong>AI分析（7種類）</strong> ― Claude APIで日記を深層分析。今日・今日の景色・急所・外基準の統合・自然の眼・時間の地層・横断読みの7種類。</li>
          <li><strong>成長タイムライン</strong> ― AIを使わずに端末内で完結する感情分析。ネガティブ比率・安定指数・標高メタファー・トレンド検出をグラフで可視化。</li>
          <li><strong>宝物庫</strong> ― AIが日記の中から「光っている一文」を自動で見つけて集める。</li>
          <li><strong>AI分析ログ</strong> ― 過去のAI分析結果をすべて保存・一覧表示。</li>
        </ul>

        <h2>使い方（2ステップ）</h2>
        <ol>
          <li><strong>日記をインポート</strong>: テキストファイル（.txt）、Markdown（.md）、JSON（.json）をドラッグ＆ドロップ。日付を自動認識。</li>
          <li><strong>AI分析・可視化</strong>: 7種類のAI深層分析、タイムラインで感情の推移、宝物庫で光る一文を集める。</li>
        </ol>

        <h2>特徴</h2>
        <ul>
          <li>完全無料・アカウント登録不要</li>
          <li>データは端末内のみ保存（IndexedDB）・サーバー送信なし</li>
          <li>Cookie・トラッキング一切不使用</li>
          <li>PWA対応でオフライン動作</li>
          <li>テキスト・Markdown・JSON形式の日記インポート対応</li>
